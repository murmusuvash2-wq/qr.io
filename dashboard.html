<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Analytics Dashboard | Pro | EzQR</title>
  <style>
    :root {
      --bg: #ffffff; --s1: #f8fafc; --s2: #f1f5f9; --bd: #e2e8f0; --bd2: #cbd5e1;
      --p: #000000; --pl: #000000; --tx: #0f172a; --mu: #64748b; --gr: #10b981;
    }
    body {
      background: var(--bg); color: var(--tx);
      font-family: 'Syne', -apple-system, sans-serif;
      margin: 0; padding: 0;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--bd); width: 100%;
    }
    .nav-in {
      max-width: 1100px; margin: 0 auto; padding: 0 10px;
      height: 56px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      text-decoration: none; color: var(--tx);
      font-size: 18px; font-weight: 800; letter-spacing: -.3px;
    }
    .logo span { color: #0f172a; }
    .logo em { font-style: normal; color: #0f172a; }
    .nav-cta {
      background: var(--s2); border: 1px solid var(--bd); padding: 7px 14px; border-radius: 8px;
      color: var(--mu); font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none;
    }
    .nav-cta:hover { color: #000000; border-color: #000000; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-in">
      <a href="/" class="logo"><span>EzQR</span><em>.io</em></a>
      <a href="/" class="nav-cta">Back to Studio</a>
    </div>
  </nav>
  <div id="root"></div>
  <script type="module" src="/src/dashboard-main.tsx"></script>
</body>
</html>
